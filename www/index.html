<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a1a">
    <title>GigHala</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            color: #fff;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            border-radius: 20px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #333;
            border-top-color: #00C853;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-top: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #888; font-size: 13px; margin-top: 12px; }
    </style>
</head>
<body>
    <!--
        This file is the Capacitor webDir fallback.
        The actual app loads from the Flask server URL configured in capacitor.config.ts.
        If you see this page, the server URL is unreachable.
    -->
    <img class="logo" src="/static/logo.png" alt="GigHala"
         onerror="this.style.display='none'">
    <div class="spinner"></div>
    <p>Memuatkan GigHala…</p>
    <script>
        // Capacitor will redirect to server.url automatically.
        // This script is just a safety net for browser preview.
        if (!window.Capacitor) {
            // Running in browser, not in native app — show a message
            document.querySelector('p').textContent =
                'Buka dengan aplikasi GigHala untuk Android.';
        }
    </script>
</body>
</html>
