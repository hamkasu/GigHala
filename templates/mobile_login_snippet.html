{#
  Drop this snippet into the login page template to show a biometric login
  button when running inside the GigHala Android app.

  Usage in login.html (or base.html login form):
    {% include 'mobile_login_snippet.html' %}
#}

<button
    class="biometric-login-btn"
    type="button"
    id="biometricLoginBtn"
    aria-label="Log masuk dengan cap jari / muka">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
         stroke-linejoin="round" aria-hidden="true">
        <path d="M12 10a2 2 0 0 0-2 2c0 1.02-.1 2.51-.26 4"/>
        <path d="M14 13.12c0 2.38 0 6.38-1 8.88"/>
        <path d="M17.29 21.02c.12-.6.43-2.3.5-3.02"/>
        <path d="M2 12a10 10 0 0 1 18-6"/>
        <path d="M2 17a5 5 0 0 1 10 0v2"/>
        <path d="M2 5a16.7 16.7 0 0 0 0 12"/>
        <circle cx="12" cy="12" r="2"/>
    </svg>
    Log masuk dengan Biometrik
</button>

<script>
(function () {
    const btn = document.getElementById('biometricLoginBtn');
    if (!btn) return;

    // Show only when running in native app and biometric is enrolled
    async function initBiometricBtn() {
        if (!window.GigHalaMobile || !GigHalaMobile.isNative()) return;
        const status = await GigHalaMobile.biometric.isAvailable();
        if (status.isAvailable) {
            btn.style.display = 'flex';
        }
    }

    btn.addEventListener('click', async () => {
        try {
            await GigHalaMobile.biometric.loginWithBiometric();
        } catch (e) {
            console.warn('Biometric login failed:', e);
        }
    });

    // Run after capacitor-init.js has set up GigHalaMobile
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initBiometricBtn);
    } else {
        setTimeout(initBiometricBtn, 200); // wait for GigHalaMobile init
    }
})();
</script>
